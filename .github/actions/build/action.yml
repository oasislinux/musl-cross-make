name: musl-cross-make
inputs:
  config:
    required: true
    type: string
  target:
    required: true
    type: string
  output:
    required: true
    type: string
  archive:
    type: string
  common_config:
    type: string
  binutils_config:
    type: string
  gcc_config:
    type: string
  musl_config:
    type: string
runs:
  using: composite
  steps:
  - uses: actions/cache@v5
    id: sources-cache
    with:
      key: sources-${{ hashFiles('hashes/*') }}
      path: sources
  # touch sources so they are not considered out-of-date
  - name: touch sources
    if: steps.sources-cache.outputs.cache-hit == 'true'
    shell: sh
    run: touch sources/*
  - name: build
    shell: sh
    run: |
      cp ${{ inputs.config }} config.mak
      cat >>config.mak <<'EOF'
      TARGET = ${{ inputs.target }}
      DL_CMD = curl --retry 5 -fsSLo

      COMMON_CONFIG += ${{ inputs.common_config }}
      BINUTILS_CONFIG += ${{ inputs.binutils_config }}
      GCC_CONFIG += ${{ inputs.gcc_config }}
      MUSL_CONFIG += ${{ inputs.musl_config }}
      EOF
      make "OUTPUT=$GITHUB_WORKSPACE/${{ inputs.output }}" install
      cd ${{ inputs.output }}
      for ldso in */lib/ld-musl-*; do
        ln -s "../${ldso%%/*}/lib/libc.so" "${ldso#*/}"
        rm "$ldso"
      done
  - name: upload failed config.log
    if: failure()
    uses: actions/upload-artifact@v7
    with:
      name: config-logs
      path: 'build/**/config.log'
  - name: archive
    if: ${{ inputs.archive }}
    shell: sh
    run: tar -cvf - --numeric-owner --owner=0 --group=0 --mtime=@0 ${{ inputs.output }} | zstd -9 -o ${{ inputs.archive }}
  - uses: actions/upload-artifact@v7
    if: ${{ inputs.archive }}
    with:
      path: ${{ inputs.archive }}
      archive: false
